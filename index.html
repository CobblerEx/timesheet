<script>
// ═══════════════════════════════════════════════════════════════════════════
// UNDO DELETION MANAGER
// ═══════════════════════════════════════════════════════════════════════════

class UndoManager {
  constructor() {
    this.deletionStack = [];
    this.maxHistoryItems = 50;
    this.loadDeletionStack();
  }

  /**
   * Record a deletion for potential undo
   * @param {string} type - 'material', 'client', or 'address'
   * @param {object} data - The deleted item
   */
  recordDeletion(type, data) {
    const deletion = {
      type,
      data,
      timestamp: Date.now(),
      id: `${type}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`
    };

    this.deletionStack.unshift(deletion); // Add to front
    
    // Keep stack size manageable
    if (this.deletionStack.length > this.maxHistoryItems) {
      this.deletionStack.pop();
    }

    this.saveDeletionStack();
    return deletion;
  }

  /**
   * Undo the last deletion
   * @returns {object|null} The deletion record that was undone
   */
  undoLastDeletion() {
    if (this.deletionStack.length === 0) return null;
    
    const deletion = this.deletionStack.shift();
    this.saveDeletionStack();
    return deletion;
  }

  /**
   * Get the last deletion without removing it
   * @returns {object|null}
   */
  peekLastDeletion() {
    return this.deletionStack.length > 0 ? this.deletionStack[0] : null;
  }

  /**
   * Save deletion stack to localStorage
   */
  saveDeletionStack() {
    try {
      localStorage.setItem('deletionStack', JSON.stringify(this.deletionStack));
    } catch (e) {
      console.error('Failed to save deletion stack:', e);
    }
  }

  /**
   * Load deletion stack from localStorage
   */
  loadDeletionStack() {
    try {
      const saved = localStorage.getItem('deletionStack');
      if (saved) {
        this.deletionStack = JSON.parse(saved);
      }
    } catch (e) {
      console.error('Failed to load deletion stack:', e);
      this.deletionStack = [];
    }
  }

  /**
   * Clear entire deletion history
   */
  clearHistory() {
    this.deletionStack = [];
    this.saveDeletionStack();
  }
}

// Initialize global undo manager
const undoManager = new UndoManager();

// ═══════════════════════════════════════════════════════════════════════════
// TOAST NOTIFICATION SYSTEM
// ═══════════════════════════════════════════════════════════════════════════

function showUndoToast(itemType, itemName) {
  const toast = document.getElementById('undoToast');
  if (!toast) return;

  // Update toast content
  const typeLabel = itemType.charAt(0).toUpperCase() + itemType.slice(1);
  const displayName = itemName.substring(0, 30) + (itemName.length > 30 ? '...' : '');
  
  toast.innerHTML = `
    <span>${typeLabel} deleted: <strong>${displayName}</strong></span>
    <button onclick="undoLastDeletion()">Undo</button>
  `;

  // Show toast
  toast.classList.add('show');

  // Auto-hide after 8 seconds
  clearTimeout(toast.hideTimeout);
  toast.hideTimeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 8000);
}

function hideUndoToast() {
  const toast = document.getElementById('undoToast');
  if (toast) {
    toast.classList.remove('show');
    clearTimeout(toast.hideTimeout);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// MATERIAL DELETION WITH UNDO
// ═══════════════════════════════════════════════════════════════════════════

function deleteMaterialWithUndo(materialId) {
  try {
    // Get current materials
    const savedMaterials = JSON.parse(localStorage.getItem('savedMaterials') || '[]');
    
    // Find the material to delete
    const materialIndex = savedMaterials.findIndex(m => m.id === materialId);
    if (materialIndex === -1) {
      alert('Material not found');
      return;
    }

    const materialToDelete = savedMaterials[materialIndex];

    // Record deletion in undo stack
    undoManager.recordDeletion('material', {
      id: materialId,
      ...materialToDelete
    });

    // Remove from storage
    savedMaterials.splice(materialIndex, 1);
    localStorage.setItem('savedMaterials', JSON.stringify(savedMaterials));

    // Refresh UI
    renderSavedMaterials();
    showUndoToast('material', materialToDelete.name || 'Unnamed Material');

  } catch (e) {
    console.error('Error deleting material:', e);
    alert('Failed to delete material');
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// CLIENT/PROFILE DELETION WITH UNDO
// ═══════════════════════════════════════════════════════════════════════════

function deleteProfileWithUndo(profileName) {
  try {
    // Get current profiles
    const savedProfiles = JSON.parse(localStorage.getItem('savedProfiles') || '[]');
    
    // Find the profile to delete
    const profileIndex = savedProfiles.findIndex(p => p.name === profileName);
    if (profileIndex === -1) {
      alert('Client not found');
      return;
    }

    const profileToDelete = savedProfiles[profileIndex];

    // Record deletion in undo stack
    undoManager.recordDeletion('client', {
      name: profileName,
      ...profileToDelete
    });

    // Remove from storage
    savedProfiles.splice(profileIndex, 1);
    localStorage.setItem('savedProfiles', JSON.stringify(savedProfiles));

    // Refresh UI
    renderSavedProfiles();
    showUndoToast('client', profileName);

  } catch (e) {
    console.error('Error deleting profile:', e);
    alert('Failed to delete client');
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// ADDRESS DELETION WITH UNDO
// ═══════════════════════════════════════════════════════════════════════════

function deleteAddressWithUndo(addressId) {
  try {
    // Get current locations
    const savedLocations = JSON.parse(localStorage.getItem('savedLocations') || '[]');
    
    // Find the address to delete
    const addressIndex = savedLocations.findIndex(a => a.id === addressId);
    if (addressIndex === -1) {
      alert('Address not found');
      return;
    }

    const addressToDelete = savedLocations[addressIndex];

    // Record deletion in undo stack
    undoManager.recordDeletion('address', {
      id: addressId,
      ...addressToDelete
    });

    // Remove from storage
    savedLocations.splice(addressIndex, 1);
    localStorage.setItem('savedLocations', JSON.stringify(savedLocations));

    // Refresh UI
    renderSavedLocations();
    showUndoToast('address', addressToDelete.address || 'Unnamed Address');

  } catch (e) {
    console.error('Error deleting address:', e);
    alert('Failed to delete address');
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// UNIVERSAL UNDO FUNCTION
// ═══════════════════════════════════════════════════════════════════════════

function undoLastDeletion() {
  const deletion = undoManager.undoLastDeletion();
  if (!deletion) {
    alert('Nothing to undo');
    return;
  }

  try {
    switch (deletion.type) {
      case 'material':
        restoreMaterial(deletion.data);
        break;
      case 'client':
        restoreProfile(deletion.data);
        break;
      case 'address':
        restoreAddress(deletion.data);
        break;
      default:
        console.error('Unknown deletion type:', deletion.type);
    }

    hideUndoToast();
    showSuccessMessage(`${deletion.type.charAt(0).toUpperCase() + deletion.type.slice(1)} restored!`);

  } catch (e) {
    console.error('Error undoing deletion:', e);
    alert('Failed to restore item');
  }
}

function restoreMaterial(material) {
  const savedMaterials = JSON.parse(localStorage.getItem('savedMaterials') || '[]');
  
  // Check if material already exists
  if (savedMaterials.find(m => m.id === material.id)) {
    alert('Material already exists');
    return;
  }

  savedMaterials.push(material);
  localStorage.setItem('savedMaterials', JSON.stringify(savedMaterials));
  renderSavedMaterials();
}

function restoreProfile(profile) {
  const savedProfiles = JSON.parse(localStorage.getItem('savedProfiles') || '[]');
  
  // Check if profile already exists
  if (savedProfiles.find(p => p.name === profile.name)) {
    alert('Client already exists');
    return;
  }

  savedProfiles.push(profile);
  localStorage.setItem('savedProfiles', JSON.stringify(savedProfiles));
  renderSavedProfiles();
}

function restoreAddress(address) {
  const savedLocations = JSON.parse(localStorage.getItem('savedLocations') || '[]');
  
  // Check if address already exists
  if (savedLocations.find(a => a.id === address.id)) {
    alert('Address already exists');
    return;
  }

  savedLocations.push(address);
  localStorage.setItem('savedLocations', JSON.stringify(savedLocations));
  renderSavedLocations();
}

function showSuccessMessage(message) {
  const toast = document.getElementById('undoToast');
  if (!toast) return;

  toast.innerHTML = `<span style="color: #7CFF9B;">✓ ${message}</span>`;
  toast.classList.add('show');

  clearTimeout(toast.hideTimeout);
  toast.hideTimeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// ══════════════════════════════════════════════════════��════════════════════
// KEYBOARD SHORTCUT: Ctrl+Z or Cmd+Z for undo
// ═══════════════════════════════════════════════════════════════════════════

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    // Only trigger if not typing in an input field
    if (document.activeElement.tagName !== 'INPUT' && 
        document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      undoLastDeletion();
    }
  }
});

</script>
