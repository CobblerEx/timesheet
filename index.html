<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Timesheet Creator</title>
    <link rel="stylesheet" href="css/photos.css">
<style id="fa-inline">

</head>
<body>
    <!-- Your existing HTML content goes here -->
    
    <!-- Photo Upload Section -->
    <section id="photoSection" style="display: none;">
        <h2>Quote Photos</h2>
        <button id="uploadPhotoBtn" class="upload-photo-btn">📷 Add Photos</button>
        <input type="file" id="quotePhotoInput" accept="image/*" multiple>
        
        <div id="photoDropZone" class="photo-drop-zone">
            <p class="photo-drop-zone-text">
                <strong>Drop photos here</strong>
                or click to select
            </p>
            <p id="uploadStatus"></p>
        </div>
        
        <div id="photoGallery"></div>
    </section>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/imageProcessor.js"></script>
    <script src="js/quotePhotoManager.js"></script>
    <script>
        // Initialize photo system when document is ready
        document.addEventListener('DOMContentLoaded', async () => {
            await photoManager.init();
        });

        // Example: Show photo section and load photos for a quote
        // Call this when user selects/creates a quote
        function loadQuotePhotos(quoteId) {
            const photoSection = document.getElementById('photoSection');
            if (photoSection) {
                photoSection.style.display = 'block';
            }
            photoManager.loadPhotos(quoteId);
        }
    </script>
</body>
</html>
